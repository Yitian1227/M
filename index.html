<!DOCTYPE html>

            .container:not(.photo-section) .photo-item .project-text,
            .container:not(.photo-section) .photo-item .project-description,
            .container:not(.photo-section) .photo-item .date-text,
            .container:not(.photo-section) .photo-item .featured-text,
            .container:not(.photo-section) .photo-item .arrow {
                color: #ffffff;
            }
            
            .container.photo-section .brand-title {
                color: #000000;
            }

            .container.photo-section .description {

            }

            .container.photo-section .toggle {

            .container.photo-section .toggle::before,

        /* 按鈕容器樣式 */
        .buttons-container {
            display: flex;
            flex-direction: row;
            gap: 50px;
            margin: 15px 0;
            justify-content: center;
            padding: 20px;
            overflow: visible;
            position: relative;
            z-index: 5;
        }
        
        .control-label {
            margin-right: 15px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .toggle { 
            width: 80px;
            height: 80px;
            border-radius: 50%; 
            background: none;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer; 
            transition: all 0.3s ease; 
            position: relative;
            z-index: 5;
            font-family: 'Kantumruy Pro', sans-serif;
            font-size: 0.9rem;
        }
        
        .toggle:hover {
            border-color: white;
        }
        
        .toggle.active { 
            background-color: white;
            color: #000;
            border-color: white;
        }
        
        /* 漣漪動畫 */
        .toggle::before,
        .toggle::after,
        .toggle .ripple-circle {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            background-color: transparent;
            border: 2px solid white;
            opacity: 0;
            pointer-events: none;
            z-index: 2;
        }
        
        .toggle::before {
            animation: none;
        }
        
        .toggle::after {
            animation: none;
        }
        
        .toggle .ripple-circle {
            animation: none;
        }
        
        .toggle:hover::before {
            animation: ripple 2s ease-out 0s infinite;
        }
        
        .toggle:hover::after {
            animation: ripple 2s ease-out 0.5s infinite;
        }
        
        .toggle:hover .ripple-circle {
            animation: ripple 2s ease-out 1s infinite;
        }
        
        .toggle.active::before {
            animation: ripple 2s ease-out 0s infinite;
        }
        
        .toggle.active::after {
            animation: ripple 2s ease-out 0.5s infinite;
        }
        
        .toggle.active .ripple-circle {
            animation: ripple 2s ease-out 1s infinite;
        }
        
        @keyframes ripple {
            0% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(2.5);
            }
        }

        .photo-item img {

        @media (max-width: 767px) {

        }
    </style>
</head>

    <script>
        // 添加滾動監聽
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.container');
            const photoGallery = document.querySelector('.photo-gallery');
            
            if (container && photoGallery) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            container.classList.add('photo-section');
                        } else {
                            container.classList.remove('photo-section');
                        }
                    });
                }, {
                    threshold: 0.1
                });
                
                observer.observe(photoGallery);
            }
        });

        // 原有的初始化控制開關代碼
        document.addEventListener('DOMContentLoaded', () => {
            const videoToggle = document.getElementById('video-toggle');
            let youtubeFrames = []; // 用於存儲所有YouTube iframe
            
            // 添加影片開關點擊事件
            if (videoToggle) {
                // 預設為啟用（自動播放）
                videoToggle.classList.add('active');
                videoToggle.textContent = 'Pause';
                videoToggle.appendChild(document.createElement('span')).className = 'ripple-circle';
                
                videoToggle.addEventListener('click', function() {
                    this.classList.toggle('active');
                    const isPlaying = this.classList.contains('active');
                    
                    // 更新按鈕文字
                    if (isPlaying) {
                        this.textContent = 'Pause';
                    } else {
                        this.textContent = 'Play';
                    }
                    
                    // 重新添加ripple元素
                    this.appendChild(document.createElement('span')).className = 'ripple-circle';
                    
                    // 控制所有影片的播放狀態
                    controlAllVideos(isPlaying);
                });
            }
            
            // 控制所有影片的函數
            function controlAllVideos(play) {
                // 獲取所有iframe（YouTube影片）
                const iframes = document.querySelectorAll('iframe');
                
                iframes.forEach(iframe => {
                    try {
                        const command = play ? 'playVideo' : 'pauseVideo';
                        iframe.contentWindow.postMessage(`{"event":"command","func":"${command}","args":""}`, '*');
                    } catch (e) {
                        console.log('無法控制影片:', e);
                    }
                });
            }
            
            // 等待dynamic-frame.js初始化完成
            setTimeout(() => {
                // 獲取開關狀態
                const isAutoplayEnabled = videoToggle ? videoToggle.classList.contains('active') : true;
                
                // 確保所有框架中的YouTube影片都啟用了API控制
                const frameElements = document.querySelectorAll('.frame');
                
                frameElements.forEach(frame => {
                    const iframe = frame.querySelector('iframe');
                    if (iframe) {
                        // 保存原始src
                        const originalSrc = iframe.src;
                        
                        // 檢查是否已經啟用API
                        if (!originalSrc.includes('enablejsapi=1')) {
                            // 添加enablejsapi參數
                            let newSrc = originalSrc;
                            if (newSrc.includes('?')) {
                                newSrc += '&enablejsapi=1';
                            } else {
                                newSrc += '?enablejsapi=1';
                            }
                            
                            // 更新autoplay參數
                            if (newSrc.includes('autoplay=1') && !isAutoplayEnabled) {
                                newSrc = newSrc.replace('autoplay=1', 'autoplay=0');
                            }
                            
                            iframe.src = newSrc;
                        }
                        
                        youtubeFrames.push(iframe);
                    }
                });
                
                // 特殊處理框架7，若已經被我們之前的代碼修改過
                const frame7 = document.querySelector('[data-frame-id="7"]');
                if (frame7 && frame7.innerHTML === '') {
                    // 添加YouTube影片，修正ID提取
                    const iframe = document.createElement('iframe');
                    // 啟用API控制
                    iframe.src = "https://www.youtube.com/embed/7mc_FYVJmzE?enablejsapi=1&autoplay=" + (isAutoplayEnabled ? "1" : "0") + "&mute=1&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3&fs=0&loop=1&playlist=7mc_FYVJmzE";
                    iframe.id = "youtube-player";
                    iframe.title = "YouTube video player";
                    iframe.frameBorder = "0";
                    iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
                    iframe.allowFullscreen = true;
                    iframe.style.width = "100%";
                    iframe.style.height = "100%";
                    iframe.style.position = "absolute";
                    iframe.style.top = "0";
                    iframe.style.left = "0";
                    
                    // 添加到框架中
                    frame7.appendChild(iframe);
                    youtubeFrames.push(iframe);
                    
                    // 添加覆蓋層，用於跳轉
                    const overlay = document.createElement('div');
                    overlay.className = 'video-overlay';
                    overlay.onclick = function() {
                        window.location.href = 'newpage7';
                    };
                    frame7.appendChild(overlay);
                    
                    // 配置URL以便dynamic-frame.js的點擊處理
                    if (typeof initialFrames !== 'undefined' && initialFrames) {
                        const frame = initialFrames.find(f => f.id === 7);
                        if (frame) frame.url = 'newpage7';
                    }
                }
                
                // 如果開關是關閉狀態，暫停所有影片
                if (!isAutoplayEnabled) {
                    // 稍微延遲以確保iframe已經完全載入
                    setTimeout(() => {
                        controlAllVideos(false);
                    }, 1000);
                }
            }, 1000); // 增加等待時間確保dynamic-frame.js已經完全初始化
        });

        // 處理主題按鈕文字
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('theme-toggle');
            
            if (themeToggle) {
                // 檢查當前主題設置更新文字
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'light') {
                    themeToggle.textContent = 'Night';
                } else {
                    themeToggle.textContent = 'Day';
                }
                
                // 重新添加ripple元素
                themeToggle.appendChild(document.createElement('span')).className = 'ripple-circle';
                
                // 添加事件監聽器
                themeToggle.addEventListener('click', function() {
                    const isLightMode = this.classList.contains('active');
                    
                    // 更新按鈕文字
                    if (isLightMode) {
                        this.textContent = 'Night';
                    } else {
                        this.textContent = 'Day';
                    }
                    
                    // 重新添加ripple元素
                    this.appendChild(document.createElement('span')).className = 'ripple-circle';
                });
            }
        });
    </script>
</body>
